<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenAI Login Bug Revealed 1,639 Internal Model Names</title>
<style>
  :root{
    --bg:#15151a; --surface:#1d1d23; --surface2:#202027; --line:#2e2e36;
    --ink:#e9e5d8; --soft:#cbc7ba; --muted:#9d9a8e; --faint:#74726a;
    --accent:#c8a96a; --accent-soft:#d8be86; --link:#9fc0d8;
    --code-bg:#232229; --hit:#4a3f1f;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--ink);
    font:18px/1.72 Georgia,"Iowan Old Style","Palatino Linotype",Palatino,
         "Times New Roman","Noto Serif SC","Songti SC","Source Han Serif SC",serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .mono,code,.code{ font-family:"SF Mono",SFMono-Regular,Menlo,Consolas,
    "Liberation Mono","Roboto Mono",monospace; }
  a{ color:var(--link); }

  /* reading-progress bar */
  #progress{ position:fixed; top:0; left:0; height:3px; width:0%;
    background:var(--accent); z-index:50; transition:width .08s linear; }

  /* layout */
  .wrap{ max-width:820px; margin:0 auto; padding:60px 22px 96px; }

  h1{ font-size:46px; line-height:1.12; letter-spacing:-.5px; font-weight:600;
    margin:0 0 16px; color:#fff; }
  .meta{ color:var(--muted); font-size:15px; margin:0 0 34px;
    display:flex; flex-wrap:wrap; align-items:center; gap:10px; }
  .meta .dot{ color:var(--faint); }
  .meta b{ color:var(--accent-soft); font-weight:600; }
  .toggle{
    appearance:none; cursor:pointer; font:inherit; font-size:13px;
    color:var(--soft); background:transparent; border:1px solid var(--line);
    border-radius:999px; padding:3px 12px; display:inline-flex; gap:7px;
    align-items:center; margin-left:2px;
  }
  .toggle:hover{ border-color:var(--accent); }
  .toggle .seg{ opacity:.5; }
  .toggle .seg.on{ opacity:1; color:var(--accent-soft); }
  .toggle .sep{ opacity:.4; }

  article{ font-size:18px; }
  .lede p{ margin:0 0 22px; color:var(--soft); }
  .lede p:first-of-type{ font-size:20px; line-height:1.6; color:var(--ink); }
  .lede strong{ color:var(--ink); font-weight:600; }
  .lede code{ font-size:.86em; background:var(--code-bg); border:1px solid var(--line);
    border-radius:5px; padding:1px 6px; color:#d9d3c2; word-break:break-word; }

  figure{ margin:34px 0; }
  figure img{ display:block; width:100%; height:auto; border-radius:12px;
    border:1px solid #000; background:#0d0d10;
    box-shadow:0 18px 48px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.03) inset; }
  figure img.missing{ min-height:120px; }
  figcaption{ margin-top:12px; color:var(--muted); font-size:14.5px;
    font-style:italic; line-height:1.55; text-align:center; }
  figcaption code{ font-style:normal; font-size:.86em; background:var(--code-bg);
    border:1px solid var(--line); border-radius:4px; padding:0 5px; color:#cfc9b8; }

  .note{ background:var(--surface); border:1px solid var(--line);
    border-left:3px solid var(--accent); border-radius:8px;
    padding:14px 16px; margin:30px 0 6px; color:var(--muted); font-size:15px;
    line-height:1.6; }
  .note strong{ color:var(--soft); }

  .rule{ border:none; border-top:1px solid var(--line); margin:40px 0 26px; }

  /* search */
  .toolbar h2{ font-size:14px; text-transform:uppercase; letter-spacing:.14em;
    color:var(--muted); font-weight:600; margin:0 0 14px; }
  .search-wrap{ position:sticky; top:0; z-index:20; background:var(--bg);
    padding:14px 0 12px; }
  .search-row{ display:flex; gap:10px; align-items:center; }
  #q{ flex:1; font:inherit; font-size:16px; padding:11px 14px; color:var(--ink);
    background:var(--surface); border:1px solid var(--line); border-radius:10px; }
  #q::placeholder{ color:var(--faint); }
  #q:focus{ outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(200,169,106,.16); }
  .count{ color:var(--muted); font-size:14px; white-space:nowrap; }
  .clearbtn{ appearance:none; cursor:pointer; font:inherit; font-size:14px;
    color:var(--muted); background:var(--surface); border:1px solid var(--line);
    border-radius:10px; padding:11px 14px; }
  .clearbtn:hover{ border-color:var(--accent); color:var(--accent-soft); }

  /* category cards */
  .cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:9px; margin:6px 0 30px; }
  .card{ display:flex; justify-content:space-between; align-items:baseline; gap:10px;
    background:var(--surface); border:1px solid var(--line); border-radius:9px;
    padding:11px 13px; text-decoration:none; color:var(--soft); }
  .card:hover{ border-color:var(--accent); color:var(--ink); }
  .card .cn{ font-size:15px; line-height:1.3; }
  .card .cc{ font-size:13px; font-weight:600; color:var(--accent-soft);
    background:var(--code-bg); border:1px solid var(--line); border-radius:6px;
    padding:1px 8px; font-family:inherit; }

  /* sections */
  details.cat{ background:var(--surface); border:1px solid var(--line);
    border-radius:11px; margin:0 0 11px; overflow:hidden; }
  details.cat[open]{ border-color:#3a3a44; }
  summary.cathead{ list-style:none; cursor:pointer; display:flex;
    align-items:center; gap:12px; padding:15px 17px; font-size:19px;
    font-weight:600; color:var(--ink); user-select:none; }
  summary.cathead::-webkit-details-marker{ display:none; }
  .chev{ color:var(--accent); font-size:12px; width:12px; display:inline-block;
    transition:transform .15s ease; }
  details.cat[open] .chev{ transform:rotate(90deg); }
  .catname{ flex:1; }
  .catcount{ font-size:13px; font-weight:600; color:var(--accent-soft);
    background:var(--code-bg); border:1px solid var(--line); border-radius:6px;
    padding:1px 9px; font-family:"SF Mono",Consolas,monospace; }
  .catbody{ border-top:1px solid var(--line); }

  table{ width:100%; border-collapse:collapse; }
  tbody tr{ border-top:1px solid var(--line); }
  tbody tr:first-child{ border-top:none; }
  tr.hide{ display:none; }
  td{ padding:11px 16px; vertical-align:top; }
  td.model{ width:42%; }
  .code{ font-size:13px; background:var(--code-bg); border:1px solid var(--line);
    border-radius:6px; padding:2px 7px; cursor:copy; word-break:break-all;
    color:#d4cdbb; }
  .code:hover{ border-color:var(--accent); }
  .code.copied{ background:#26401f; border-color:#5f8a4e; color:#e6f3df; }
  td.desc{ color:var(--soft); font-size:15.5px; line-height:1.6; }
  mark{ background:var(--hit); color:#fbeec2; padding:0 1px; border-radius:2px; }

  .empty{ padding:26px 16px; color:var(--muted); text-align:center; font-size:15px; }
  footer{ margin-top:42px; color:var(--faint); font-size:14px; text-align:center;
    font-style:italic; }

  @media (max-width:620px){
    .wrap{ padding:42px 17px 72px; }
    h1{ font-size:34px; }
    article{ font-size:17px; }
    td.model{ width:auto; }
    table,tbody,tr,td{ display:block; }
    td.model{ padding-bottom:4px; }
    td.desc{ padding-top:0; padding-bottom:14px; }
  }
</style>
</head>

        against the handful of public model names. It matched against the full internal registry,
        returning the raw internal handles, each one flagged ALPHA."

        注册表，把原始的内部代号一股脑返回出来，每一个都打着 ALPHA 标记。"></p>

      <p data-en="The box only showed a page of results at a time, so to capture everything I
        searched it exhaustively &mdash; one query per character, <code>0</code> through <code>9</code>
        and then <code>a</code> through <code>z</code> &mdash; saving every handle each query returned.
        Merged and de-duplicated, those 36 searches compiled into the full list of model names."
        data-zh="搜索框每次只显示一页结果，所以为了把它们全部抓下来，我对它做了穷举搜索 &mdash; 以每个
        字符为关键词逐一查询，从 <code>0</code> 到 <code>9</code>、再从 <code>a</code> 到 <code>z</code>
        &mdash; 把每次查询返回的代号都保存下来。把这 36 次搜索的结果合并去重，就整理出了完整的模型名清单。"></p>

<script>
(function(){
  "use strict";
  var DATA = JSON.parse(document.getElementById("data").textContent);
  var html = document.documentElement;
  var sectionsEl = document.getElementById("sections");
  var cardsEl = document.getElementById("cards");
  var q = document.getElementById("q");
  var countEl = document.getElementById("count");

  function slug(s){ return "cat-" + s.replace(/[^a-z0-9]+/gi,"-").toLowerCase(); }
  function esc(s){ return s.replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }

  // ---- category cards ----
  var cardsHtml = "";
  DATA.categories.forEach(function(cat){
    cardsHtml += '<a class="card" href="#'+slug(cat.en)+'" data-card="'+slug(cat.en)+'">'
      + '<span class="cn" data-en="'+esc(cat.en)+'" data-zh="'+esc(cat.zh)+'"></span>'
      + '<span class="cc">'+cat.count+'</span></a>';
  });
  cardsEl.innerHTML = cardsHtml;

  // ---- sections ----
  var html2 = "";
  DATA.categories.forEach(function(cat){
    var rows = "";
    cat.rows.forEach(function(r,i){
      rows += '<tr data-i="'+i+'">'
        + '<td class="model"><span class="code mono" tabindex="0">'+esc(r.m)+'</span></td>'
        + '<td class="desc"><span data-en="'+esc(r.en)+'" data-zh="'+esc(r.zh)+'"></span></td>'
        + '</tr>';
    });
    html2 += '<details class="cat" id="'+slug(cat.en)+'">'
      + '<summary class="cathead"><span class="chev">&#9654;</span>'
      + '<span class="catname" data-en="'+esc(cat.en)+'" data-zh="'+esc(cat.zh)+'"></span>'
      + '<span class="catcount">'+cat.count+'</span></summary>'
      + '<div class="catbody"><table><tbody>'+rows
      + '</tbody></table><div class="empty" style="display:none" '
      + 'data-en="No matches in this category." data-zh="该分类下没有匹配项。"></div></div>'
      + '</details>';
  });
  sectionsEl.innerHTML = html2;

  var detailEls = Array.prototype.slice.call(
    sectionsEl.querySelectorAll("details.cat"));
  var rowEls = detailEls.map(function(d){
    return Array.prototype.slice.call(d.querySelectorAll("tbody tr")); });
  var emptyEls = detailEls.map(function(d){ return d.querySelector(".empty"); });

  // ---- language ----
  var lang = localStorage.getItem("imv-lang") || "en";
  var i18nEls = Array.prototype.slice.call(
    document.querySelectorAll("[data-en],[data-zh]"));
  function applyLang(){
    html.setAttribute("lang", lang);
    var other = (lang === "zh") ? "data-en" : "data-zh";
    var pref = "data-" + lang;
    i18nEls.forEach(function(el){
      var txt = el.getAttribute(pref);
      if(txt === null) txt = el.getAttribute(other) || "";
      el.innerHTML = txt;
    });
    document.querySelectorAll(".toggle .seg").forEach(function(s){
      s.classList.toggle("on", s.getAttribute("data-seg")===lang); });
    q.placeholder = q.getAttribute(lang==="zh" ? "data-ph-zh" : "data-ph-en");
  }
  document.getElementById("langBtn").addEventListener("click", function(){
    lang = (lang==="zh") ? "en" : "zh";
    localStorage.setItem("imv-lang", lang);
    applyLang();
    runSearch();
  });

  // ---- search ----
  function runSearch(){
    var term = q.value.trim().toLowerCase();
    var total = 0;
    detailEls.forEach(function(d,ci){
      var shown = 0;
      rowEls[ci].forEach(function(tr,ri){
        var rec = DATA.categories[ci].rows[ri];
        var hay = rec.m.toLowerCase() + " " +
                  (lang==="zh"?rec.zh:rec.en).toLowerCase();
        var hit = !term || hay.indexOf(term) !== -1;
        tr.classList.toggle("hide", !hit);
        if(hit) shown++;
      });
      total += shown;
      if(term){
        d.style.display = shown ? "" : "none";
        d.open = shown > 0;
        emptyEls[ci].style.display = shown ? "none" : "";
      } else {
        d.style.display = "";
        d.open = false;
        emptyEls[ci].style.display = "none";
      }
    });
    if(term){
      countEl.textContent = (lang==="zh")
        ? (total + " 个匹配") : (total + " match" + (total===1?"":"es"));
    } else {
      countEl.textContent = (lang==="zh")
        ? (DATA.total + " 个模型") : (DATA.total + " models");
    }
  }
  var t=null;
  q.addEventListener("input", function(){ clearTimeout(t); t=setTimeout(runSearch,120); });
  document.getElementById("clear").addEventListener("click", function(){
    q.value=""; runSearch(); q.focus();
  });

  // ---- copy codename on click ----
  sectionsEl.addEventListener("click", function(e){
    var el = e.target.closest(".code");
    if(!el) return;
    var text = el.textContent;
    var done = function(){ el.classList.add("copied");
      setTimeout(function(){ el.classList.remove("copied"); }, 700); };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done, done);
    } else {
      var ta=document.createElement("textarea"); ta.value=text;
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); }catch(_){}
      document.body.removeChild(ta); done();
    }
  });
  cardsEl.addEventListener("click", function(e){
    var a = e.target.closest(".card"); if(!a) return;
    var d = document.getElementById(a.getAttribute("data-card"));
    if(d) d.open = true;
  });

  // ---- reading-progress bar ----
  var bar = document.getElementById("progress");
  function onScroll(){
    var h = document.documentElement;
    var max = (h.scrollHeight - h.clientHeight) || 1;
    var pct = Math.min(100, Math.max(0, (h.scrollTop || document.body.scrollTop) / max * 100));
    bar.style.width = pct + "%";
  }
  window.addEventListener("scroll", onScroll, {passive:true});
  window.addEventListener("resize", onScroll);

  applyLang();
  runSearch();
  onScroll();
})();
</script>
</body>
</html>
